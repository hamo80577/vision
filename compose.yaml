name: vision-local

services:
  postgres:
    image: postgres:17-alpine
    container_name: vision-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: vision_local
      POSTGRES_USER: vision_local
      POSTGRES_PASSWORD: vision_local_password
    volumes:
      - vision_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vision_local -d vision_local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  vision_postgres_data:
