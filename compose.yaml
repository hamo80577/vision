name: vision-local

services:
  postgres:
    image: postgres:17-alpine
    container_name: vision-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: vision_admin
      POSTGRES_PASSWORD: vision_admin_password
    volumes:
      - vision_phase_9_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vision_admin -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  vision_phase_9_postgres_data:
