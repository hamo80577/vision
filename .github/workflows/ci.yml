name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: vision_admin
          POSTGRES_PASSWORD: vision_admin_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vision_admin -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: test
      API_HOST: 127.0.0.1
      API_PORT: 4000
      DATABASE_URL: postgresql://vision_runtime:vision_runtime_password@127.0.0.1:5432/vision_local
      DATABASE_ADMIN_URL: postgresql://vision_admin:vision_admin_password@127.0.0.1:5432/postgres
      DATABASE_ADMIN_TARGET_DB: vision_local
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:4000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check migrations
        run: pnpm db:check

      - name: Reset database
        run: pnpm db:reset

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
